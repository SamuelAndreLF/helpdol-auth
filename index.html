<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HelpDol</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body { background: linear-gradient(160deg, #16213e 0%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #fff; }
  .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 22px; padding: 40px 32px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
  .logo { font-size: 38px; font-weight: 800; letter-spacing: .5px; }
  .logo span { color: #1DB954; }
  .tag { color: #cbd5e1; font-size: 15px; margin-top: 10px; line-height: 1.5; }
  .feats { text-align: left; margin: 26px auto 0; max-width: 320px; }
  .feat { display: flex; align-items: center; gap: 10px; color: #e2e8f0; font-size: 14px; padding: 7px 0; }
  .btn { display: block; margin-top: 26px; padding: 15px; background: #1DB954; color: #fff; border-radius: 14px; font-size: 16px; font-weight: 700; text-decoration: none; }
  .links { margin-top: 18px; font-size: 13px; }
  .links a { color: #94a3b8; text-decoration: none; margin: 0 8px; }
  .links a:hover { color: #fff; }
  .foot { margin-top: 22px; color: #64748b; font-size: 11px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Help<span>Dol</span></div>
    <div class="tag">Controle seu dinheiro, sua equipe e seus resultados — direto pelo app ou pelo ChatGPT.</div>
    <div class="feats">
      <div class="feat">💰 Entradas, despesas e pagamentos num só lugar</div>
      <div class="feat">🧾 Recibos e relatório de imposto (IRS)</div>
      <div class="feat">🤖 Integrado com o ChatGPT</div>
    </div>
    <a class="btn" href="https://helpdol.com">Conhecer o HelpDol</a>
    <div class="links">
      <a href="/privacy/">Privacidade</a> · <a href="/terms/">Termos</a>
    </div>
    <div class="foot">© HelpDol · helpdol.com</div>
  </div>
</body>
</html>
